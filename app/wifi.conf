CONFIG_APP_WIFI_SSID="iot"


CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3100
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048
CONFIG_LOG_BUFFER_SIZE=2048
CONFIG_NET_PKT_RX_COUNT=6
CONFIG_NET_PKT_TX_COUNT=6
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=30000
CONFIG_L2_WIFI_CONNECTIVITY=y
# High stack for disconnect?
CONFIG_L2_WIFI_CONN_WQ_STACK_SIZE=6144
CONFIG_PARTITION_MANAGER_ENABLED=y
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=4096
CONFIG_NET_BUF_TX_COUNT=12
# CONFIG_WIFI_NM_WPA_SUPPLICANT_GLOBAL_HEAP is not set
CONFIG_WIFI_NM_WPA_SUPPLICANT_LOG_LEVEL_ERR=y
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
CONFIG_ENTROPY_NRF5_THR_THRESHOLD=4
CONFIG_ENTROPY_NRF5_ISR_THRESHOLD=12
CONFIG_NET_MGMT_EVENT_STACK_SIZE=1024
CONFIG_WIFI_NRF70_LOG_LEVEL_ERR=y
CONFIG_NRF70_RX_NUM_BUFS=16
CONFIG_NRF70_MAX_TX_AGGREGATION=1
CONFIG_NRF70_IRQ_WQ_STACK_SIZE=1024
CONFIG_NRF_WIFI_CTRL_HEAP_SIZE=15000
CONFIG_NRF_WIFI_DATA_HEAP_SIZE=40000
CONFIG_NET_BUF_RX_COUNT=6
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_STATIC=y
CONFIG_WIFI_CREDENTIALS_STATIC_SSID="iot"
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_TEST_RANDOM_GENERATOR=y
